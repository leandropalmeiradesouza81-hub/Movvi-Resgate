<!DOCTYPE html>
<html lang="pt-BR" id="html-root">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
  <title>Movvi Resgate — Cliente</title>
  <meta name="theme-color" content="#ffd900" />
  <link rel="manifest" href="/manifest_client.json" />
  <link rel="apple-touch-icon" href="/assets/images/logo_movvi_icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ffd900", "background-light": "#f8f8f5", "background-dark": "#23200f", "surface-dark": "#363117", "border-dark": "#6b622e" }, fontFamily: { "display": ["Inter", "sans-serif"], "mono": ["JetBrains Mono", "monospace"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }
  </script>
  <script>
    var manualTheme = localStorage.getItem('movvi_client_theme');
    function applyTheme() {
      if (manualTheme === 'dark') document.documentElement.classList.add('dark');
      else if (manualTheme === 'light') document.documentElement.classList.remove('dark');
      else {
        var h = new Date().getHours();
        if (h < 6 || h >= 18) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }
    }
    if (!manualTheme) { manualTheme = 'light'; localStorage.setItem('movvi_client_theme', 'light'); }
    applyTheme();
  </script>
  <style>
    html,
    body {
      background: #e5e7eb;
      margin: 0;
      padding: 0;
      height: 100%;
      transition: background 0.3s;
    }

    html.dark,
    html.dark body {
      background: #050505;
    }

    /* Dark mode map tiles - invert to create dark look while keeping blue ocean */
    html.dark .leaflet-tile-pane {
      filter: invert(1) hue-rotate(180deg) brightness(0.8) contrast(1.1);
    }

    html.dark .leaflet-marker-pane,
    html.dark .leaflet-overlay-pane {
      filter: none;
    }

    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      -webkit-font-smoothing: antialiased;
    }

    #phone {
      width: 100%;
      height: 100dvh;
      background: #ffffff;
      position: relative;
      overflow: hidden;
      box-shadow: none;
      border: none;
      transition: background 0.3s, border 0.3s;
    }

    @media (min-width: 480px) {
      #phone {
        width: 390px;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.2);
        border: 1px solid #d1d5db;
        margin: 0 auto;
      }
    }

    html.dark #phone {
      background: #000000;
      border-color: #1a1a1a;
    }
    
    @media (min-width: 480px) {
      html.dark #phone {
        box-shadow: 0 0 60px rgba(0, 0, 0, 1);
      }
    }

    #app-content {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 1;
    }

    .view {
      display: none;
      flex-direction: column;
      min-height: 100%;
      transition: background 0.3s;
    }

    .view.active {
      display: flex;
    }

    #sidebar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(3px);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    html.dark #sidebar-overlay {
      background: rgba(0, 0, 0, 0.8);
    }

    #sidebar-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 78%;
      max-width: 310px;
      background: #f9fafb;
      border-right: 1px solid #e5e7eb;
      z-index: 90;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s, border 0.3s;
      display: flex;
      flex-direction: column;
    }

    html.dark #sidebar {
      background: #0a0a0a;
      border-color: #222;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    .leaflet-container {
      background: #f9fafb !important;
      font-family: 'Inter', sans-serif;
      transition: background 0.3s;
    }

    html.dark .leaflet-container {
      background: #0a0a0a !important;
    }

    .leaflet-control-zoom {
      display: none !important;
    }

    .leaflet-control-attribution {
      display: none !important;
    }

    .fade-in {
      animation: fadeIn 0.25s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .form-input {
      border-radius: 0.25rem;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    .form-input:focus {
      border-color: #2563eb;
      box-shadow: none;
      outline: none;
      border-width: 2px;
    }

    ::-webkit-scrollbar {
      width: 2px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 2px
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 2px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #f2d00d
    }

    /* Brutalist Radio */
    .custom-radio:checked {
      background-color: #2563eb;
      border-color: #2563eb;
      background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='%23000' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
    }
    /* Smart App Bar - Induction Only */
    #smart-app-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 1rem;
      right: 1rem;
      background: rgba(26, 20, 0, 0.95);
      backdrop-filter: blur(20px);
      padding: 1rem 1.25rem;
      border-radius: 1.5rem;
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,217,0,0.2);
      animation: barUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes barUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .smart-bar-content { display: flex; align-items: center; gap: 0.75rem; }
    .smart-bar-icon { width: 40px; height: 40px; background: #FFD900; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .smart-bar-icon img { width: 24px; height: auto; }
    .smart-bar-text h4 { color: #FFD900; font-size: 0.85rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .smart-bar-text p { color: white; font-size: 0.75rem; font-weight: 500; margin: 0; opacity: 0.7; }
    .btn-smart-install { background: #FFD900; color: #1a1400; padding: 0.6rem 1rem; border-radius: 0.75rem; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; white-space: nowrap; transition: transform 0.2s; }
    .btn-smart-install:active { transform: scale(0.95); }

    /* iOS Instructions Overlay */
    #ios-instructions {
      display: none;
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      right: 2rem;
      background: white;
      padding: 1.5rem;
      border-radius: 2rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
      z-index: 10001;
      text-align: center;
      animation: slideUpIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUpIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    #ios-instructions h3 { font-weight: 900; font-size: 1rem; margin-bottom: 1rem; color: #1a1400; text-transform: uppercase; }
    .ios-step { display: flex; align-items: center; gap: 1rem; text-align: left; margin-bottom: 0.75rem; font-size: 0.85rem; font-weight: 600; color: #1a1400; }
    .ios-step span { width: 24px; height: 24px; background: #FFD900; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 900; flex-shrink: 0; }
    .ios-icon { font-size: 18px !important; color: #007aff; }
  </style>
</head>

<body>
  <!-- Smart App Bar (Induction Only) -->
  <div id="smart-app-bar">
    <div class="smart-bar-content">
      <div class="smart-bar-icon">
        <img src="assets/images/logo_movvi_icon.png" alt="Movvi">
      </div>
      <div class="smart-bar-text">
        <h4>Baixar App</h4>
        <p>Use com mais rapidez</p>
      </div>
    </div>
    <button class="btn-smart-install" id="btn-smart-action">Instalar</button>
  </div>

  <!-- iOS Instructions -->
  <div id="ios-instructions">
    <h3>Instalar no iPhone</h3>
    <div class="ios-step">
      <span>1</span>
      <p>Toque no ícone de <strong>Compartilhar</strong> <span class="material-symbols-outlined ios-icon">ios_share</span> na barra inferior do Safari.</p>
    </div>
    <div class="ios-step">
      <span>2</span>
      <p>Role para baixo e toque em <strong>Adicionar à Tela de Início</strong> <span class="material-symbols-outlined ios-icon">add_box</span>.</p>
    </div>
    <div class="ios-step">
      <span>3</span>
      <p>Toque em <strong>Adicionar</strong> no canto superior direito.</p>
    </div>
    <button id="close-ios-tips" class="mt-4 text-[10px] font-black uppercase text-slate-400">Entendi</button>
  </div>

  <div id="phone">
    <div id="sidebar-overlay"></div>
    <aside id="sidebar"></aside>
    <div id="app-content"></div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/src/client/main.js"></script>
  <script>
    // PWA Installation Handler for Client App
    let deferredPrompt;
    const smartBar = document.getElementById('smart-app-bar');
    const smartBtn = document.getElementById('btn-smart-action');
    const iosTips = document.getElementById('ios-instructions');

    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    // Show floating bar by default if not installed
    if (!isStandalone && smartBar) {
      smartBar.style.display = 'flex';
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    if (smartBtn) {
      smartBtn.onclick = () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              if (smartBar) smartBar.style.display = 'none';
            }
            deferredPrompt = null;
          });
        } else if (isIOS) {
          iosTips.style.display = 'block';
        } else {
          smartBtn.innerText = 'Preprando...';
          setTimeout(() => {
            smartBtn.innerText = 'Instalar';
            if (!deferredPrompt) {
               alert('Para baixar o app, use o menu do seu navegador e selecione "Instalar App" ou "Adicionar à tela de início".');
            }
          }, 2000);
        }
      };
    }

    if (document.getElementById('close-ios-tips')) {
      document.getElementById('close-ios-tips').onclick = () => iosTips.style.display = 'none';
    }
  </script>
</body>

</html>
