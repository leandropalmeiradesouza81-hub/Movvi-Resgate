<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Redefinir Senha — Movvi Resgate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100dvh; margin:0; }
        .movvi-yellow { color: #ffd900; }
        .bg-movvi-yellow { background-color: #ffd900; }
        .border-movvi-yellow { border-color: #ffd900; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="w-full max-w-md px-6 fade-in">
        <div class="flex flex-col items-center mb-10 text-center">
            <img src="/assets/images/logo_movvi.png" alt="Movvi Resgate" class="w-48 mb-6 drop-shadow-lg" />
            <h1 class="text-2xl font-black text-white italic uppercase tracking-wider">Redefinir Senha</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Crie uma nova senha segura para sua conta.</p>
        </div>

        <div id="reset-form-container" class="bg-[#1a170e] border border-[#363117] rounded-[24px] p-8 shadow-2xl relative overflow-hidden">
            <div id="error-box" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-bold rounded-xl text-center"></div>
            
            <form id="reset-form" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#caa700] ml-1">Nova Senha</label>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••" 
                           class="w-full bg-black/40 border-2 border-[#363117] text-white rounded-xl py-4 px-4 text-sm font-semibold focus:border-[#ffd900] outline-none transition-all" />
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-[#caa700] ml-1">Confirmar Senha</label>
                    <input type="password" id="confirmPassword" required minlength="6" placeholder="••••••••" 
                           class="w-full bg-black/40 border-2 border-[#363117] text-white rounded-xl py-4 px-4 text-sm font-semibold focus:border-[#ffd900] outline-none transition-all" />
                </div>
                
                <button type="submit" id="submit-btn" 
                        class="w-full bg-[#ffd900] text-[#1a1400] font-black py-4 rounded-xl text-sm uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg mt-4 flex items-center justify-center gap-2">
                    <span>Salvar Nova Senha</span>
                </button>
            </form>

            <div id="success-view" class="hidden flex flex-col items-center py-6 text-center">
                <div class="w-16 h-16 bg-[#ffd900] rounded-full flex items-center justify-center text-[#1a1400] mb-6 shadow-lg shadow-[#ffd900]/20">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-xl font-black text-white mb-2">Senha Alterada!</h2>
                <p class="text-slate-400 text-sm mb-8 font-medium">Sua senha foi redefinida com sucesso. Redirecionando para o login...</p>
                <button id="go-login" class="text-[#ffd900] font-bold text-sm underline uppercase tracking-tighter">Ir para o Login Agora</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const type = urlParams.get('type');
        
        const formContainer = document.getElementById('reset-form');
        const successView = document.getElementById('success-view');
        const errorBox = document.getElementById('error-box');
        const submitBtn = document.getElementById('submit-btn');

        if (!token || !type) {
            errorBox.textContent = "Link de recuperação inválido. Solicite um novo link.";
            errorBox.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'pointer-events-none');
        }

        document.getElementById('reset-form').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                errorBox.textContent = "As senhas não coincidem.";
                errorBox.classList.remove('hidden');
                return;
            }

            errorBox.classList.add('hidden');
            submitBtn.innerHTML = '<div class="w-5 h-5 border-2 border-[#1a1400] border-t-transparent rounded-full animate-spin"></div>';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, type, password })
                });

                const data = await response.json();

                if (response.ok) {
                    formContainer.classList.add('hidden');
                    successView.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = type === 'client' ? '/client.html' : '/driver.html';
                    }, 3000);
                } else {
                    throw new Error(data.error || 'Erro ao redefinir senha');
                }
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.classList.remove('hidden');
                submitBtn.innerHTML = '<span>Salvar Nova Senha</span>';
                submitBtn.disabled = false;
            }
        };

        document.getElementById('go-login').onclick = () => {
            window.location.href = type === 'client' ? '/client.html' : '/driver.html';
        };
    </script>
</body>
</html>
