<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffd900",
                        "background-light": "#f8f8f5",
                        "background-dark": "#23200f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer" data-icon="ArrowBack">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Cadastro</h2>
</div>
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3 px-0">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-background-dark/50 @[480px]:rounded-lg relative aspect-video" data-alt="Foto profissional de um Chevrolet Onix Sedan branco na cidade à noite" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC0PF_yJjDcndMuSK23m8bgApTYIY4VUP-e9VefapRXwflqZpSrWhBDDDGSj2UvIhKIcJPnnWaPIPFZffl0ZcvG5-dkbp-ogwjpMdSajMN0vieR0VUmWpBzC5RoY3RWBPaElw5BOlP3sE3c9RmCx4U1R8Nf-0MpVAlp5McpnzJKK5YKMeYbeZRw-D0a_sKrYzaixftiRIwubIwWbM6rccUiwQT0HEnlN9qq-8ZPajFxrm7fq7DtJbLuJwyzh_86jZzMLPrQa0pe-X3S');">
<div class="absolute inset-0 bg-gradient-to-t from-background-dark to-transparent"></div>
</div>
</div>
</div>
<div class="px-4 pt-6 pb-2">
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-[28px] font-bold leading-tight">Crie sua conta</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pt-2">
                Preencha os dados abaixo para começar a usar o Movvi Reboque.
            </p>
</div>
<form class="flex flex-col gap-4 px-4 py-4 max-w-[480px]">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Nome Completo</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-background-dark/50 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="Digite seu nome completo" type="text"/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">CPF</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-background-dark/50 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="000.000.000-00" type="text"/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Telefone</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-background-dark/50 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="(00) 00000-0000" type="tel"/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Modelo do Carro</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-background-dark/50 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="Ex: Chevrolet Spin" type="text"/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Senha</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-300 dark:border-background-dark/50 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base font-normal" placeholder="Crie uma senha forte" type="password"/>
<button class="absolute right-4 top-4 text-slate-400" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
<div class="flex items-start gap-3 py-2">
<input class="mt-1 h-5 w-5 rounded border-slate-300 dark:border-background-dark/50 text-primary focus:ring-primary bg-white dark:bg-slate-800/50" type="checkbox"/>
<p class="text-sm text-slate-600 dark:text-slate-400 leading-tight">
                    Ao criar uma conta, você concorda com os nossos <span class="text-primary font-medium">Termos de Uso</span> e <span class="text-primary font-medium">Política de Privacidade</span>.
                </p>
</div>
<div class="pt-4 pb-10">
<button class="w-full h-14 bg-primary text-background-dark font-bold text-lg rounded-xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Criar Conta</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center pt-6 text-slate-600 dark:text-slate-400 text-sm">
                    Já possui uma conta? <span class="text-primary font-bold cursor-pointer">Faça login</span>
</p>
</div>
</form>
<div class="h-10 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
