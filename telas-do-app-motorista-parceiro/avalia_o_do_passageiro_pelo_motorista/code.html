<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Avaliação do Passageiro - Movvi Reboque</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2d00d", // Yellow accent
                        "primary-dark": "#cba900", // Darker yellow for interactions
                        "background-light": "#f8f8f5",
                        "background-dark": "#221f10", // Deep dark brown/black
                        "surface-dark": "#2d2918", // Slightly lighter background for cards
                        "surface-highlight": "#3a3522", // Even lighter for inputs/elements
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem", 
                        "lg": "0.5rem", 
                        "xl": "0.75rem", 
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3522;
            border-radius: 3px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden selection:bg-primary selection:text-background-dark">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto shadow-2xl overflow-hidden">
<!-- Header -->
<header class="flex items-center p-4 pt-6 pb-2 justify-between sticky top-0 z-10 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm">
<button class="text-slate-900 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Avaliação</h2>
<button class="flex items-center justify-end px-2 py-1 rounded-lg hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="text-primary font-bold text-sm tracking-wide">AJUDA</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center px-6 pb-24 overflow-y-auto">
<!-- Avatar & Name -->
<div class="mt-4 flex flex-col items-center w-full">
<div class="relative">
<div class="size-24 rounded-full border-4 border-surface-dark bg-surface-highlight overflow-hidden shadow-lg" data-alt="Portrait of passenger Joao Pedro" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDik3oCX2bMG-wno9neJ08k2AfFrN1LV8yHktap5Py6e7rYZrfVpLA5iv-nBWeiJiA68ZHFFjUPlpMXnK8dPn7bfFi9dnBlkmcY20BAGUy9IVabDxuHjl6P6_g8N0p-lPZ2LNfXw68wSwrbn7aWM-MFZhnAi6_Pp4S6N1xAOgDw6yHyqfOXIvIh9JbMj8irZ2XE6i5YGTmqHus3jKfb-ezQrF3peDghCtIE8wAoJBCdjVRiVDOPAzN11f-Ms_95nnxH8g1-LEjH68tB'); background-size: cover; background-position: center;">
</div>
<div class="absolute -bottom-1 -right-1 bg-green-500 rounded-full p-1 border-2 border-background-dark">
<span class="material-symbols-outlined text-white text-xs block">check</span>
</div>
</div>
<h1 class="text-2xl font-bold mt-4 text-center">João Pedro</h1>
<p class="text-slate-500 dark:text-gray-400 text-sm mt-1 text-center font-medium">
                    Viagem finalizada • R$ 45,00 • 12,5 km
                </p>
</div>
<div class="w-full h-px bg-surface-highlight my-6"></div>
<!-- Rating Stars -->
<div class="w-full flex flex-col items-center">
<h2 class="text-xl font-bold mb-4">Como foi a viagem?</h2>
<div class="flex gap-3 justify-center">
<button class="group focus:outline-none transition-transform active:scale-95">
<span class="material-symbols-outlined text-primary text-[40px] font-variation-settings-FILL-1">star</span>
</button>
<button class="group focus:outline-none transition-transform active:scale-95">
<span class="material-symbols-outlined text-primary text-[40px] font-variation-settings-FILL-1">star</span>
</button>
<button class="group focus:outline-none transition-transform active:scale-95">
<span class="material-symbols-outlined text-primary text-[40px] font-variation-settings-FILL-1">star</span>
</button>
<button class="group focus:outline-none transition-transform active:scale-95">
<span class="material-symbols-outlined text-primary text-[40px] font-variation-settings-FILL-1">star</span>
</button>
<button class="group focus:outline-none transition-transform active:scale-95">
<span class="material-symbols-outlined text-surface-highlight text-[40px] group-hover:text-primary/50 transition-colors">star</span>
</button>
</div>
<p class="text-primary font-bold mt-2 text-lg">Muito bom</p>
</div>
<!-- Feedback Tags -->
<div class="w-full mt-8">
<p class="text-sm font-semibold text-slate-500 dark:text-gray-400 mb-3 uppercase tracking-wider">O que correu bem?</p>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-surface-highlight bg-surface-dark peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary text-slate-300 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">sentiment_satisfied</span>
<span class="text-sm font-medium">Comportamento</span>
</div>
</label>
<label class="cursor-pointer group">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-surface-highlight bg-surface-dark peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary text-slate-300 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">schedule</span>
<span class="text-sm font-medium">Pontualidade</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-surface-highlight bg-surface-dark peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary text-slate-300 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="text-sm font-medium">Segurança</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-surface-highlight bg-surface-dark peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary text-slate-300 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">chat</span>
<span class="text-sm font-medium">Simpatia</span>
</div>
</label>
</div>
</div>
<!-- Observations -->
<div class="w-full mt-6">
<label class="text-sm font-semibold text-slate-500 dark:text-gray-400 mb-2 block uppercase tracking-wider" for="observations">Observações (Opcional)</label>
<div class="relative">
<textarea class="w-full bg-surface-dark border-surface-highlight text-slate-100 rounded-xl p-4 focus:ring-2 focus:ring-primary focus:border-transparent placeholder-gray-500 resize-none text-sm" id="observations" placeholder="Escreva um elogio ou observação sobre o passageiro..." rows="4"></textarea>
<div class="absolute bottom-3 right-3 pointer-events-none">
<span class="material-symbols-outlined text-gray-500 text-lg">edit</span>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-surface-highlight max-w-md mx-auto z-20">
<button class="w-full bg-primary hover:bg-primary-dark text-background-dark font-bold py-4 rounded-xl text-base shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Concluir Avaliação</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</div>
</body></html>
