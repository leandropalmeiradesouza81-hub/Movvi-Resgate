<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Menu Lateral do Motorista</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#f9d406",
                "background-light": "#f8f8f5",
                "background-dark": "#23200f",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
        /* Custom scrollbar to keep it clean */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a4421;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<!-- Design Root -->
<div class="relative flex h-screen w-full flex-col overflow-hidden bg-background-light dark:bg-background-dark">
<!-- Background Overlay (Simulating open drawer state) -->
<div class="absolute inset-0 z-40 bg-black/60 backdrop-blur-sm"></div>
<!-- Sidebar / Drawer -->
<div class="absolute left-0 top-0 z-50 flex h-full w-4/5 max-w-[320px] flex-col bg-background-light dark:bg-background-dark shadow-2xl transition-transform duration-300 ease-in-out">
<!-- User Profile Header -->
<div class="flex flex-col gap-3 px-6 pt-10 pb-6 border-b border-stone-200 dark:border-stone-700/50">
<div class="flex items-center gap-4">
<div class="relative">
<div class="h-16 w-16 overflow-hidden rounded-full border-2 border-primary">
<img alt="Driver portrait photo" class="h-full w-full object-cover" data-alt="Close up portrait of a confident driver" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_NDmBhNP1mhZzRaFMML8s2a5gNtYukBRJJA2ajtt9xgY1a-_DKGrl5Bfn_MUe82p16hD4yjPLcTsYRLWfHLy-_jSHu6zfiu_-tkn8Jcd20z3P7xWsCO2smRGJxnpXFA5bQJuLhw-K5ujtpWYHAdSCkgVH7l9QfEMs2RDZZYi7zmM3Cd8IZQ1FgP_d-T4mcrFhPJ-D9_4JnHYAQOUlzro_ZPEi2isxL53LEJxJr5l9-ROdWrhoLVEBzdp6Q8kWH0Q0ol02dCXxD5qM"/>
</div>
<div class="absolute -bottom-1 -right-1 flex items-center justify-center rounded-full bg-white dark:bg-stone-800 px-1.5 py-0.5 shadow-sm border border-stone-200 dark:border-stone-700">
<span class="material-symbols-outlined text-primary text-[14px]">star</span>
<span class="ml-0.5 text-xs font-bold text-slate-800 dark:text-slate-100">4.9</span>
</div>
</div>
<div class="flex flex-col">
<h2 class="text-xl font-bold leading-tight text-slate-900 dark:text-slate-100">Ricardo Silva</h2>
<p class="text-sm text-slate-500 dark:text-slate-400">Motorista Parceiro</p>
</div>
</div>
</div>
<!-- Navigation List -->
<div class="flex-1 overflow-y-auto px-4 py-6">
<ul class="flex flex-col gap-2">
<!-- Perfil -->
<li>
<button class="group flex w-full items-center gap-4 rounded-xl px-4 py-3 text-left transition-colors bg-primary/20 dark:bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary group-hover:text-primary/80">person</span>
<div class="flex flex-col flex-1">
<span class="text-base font-semibold text-slate-900 dark:text-slate-100">Perfil</span>
<span class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">VW Delivery Express • ABC-1234</span>
</div>
<span class="material-symbols-outlined text-slate-400 text-sm">chevron_right</span>
</button>
</li>
<!-- Saldo -->
<li>
<button class="group flex w-full items-center gap-4 rounded-xl px-4 py-3 text-left transition-colors hover:bg-stone-100 dark:hover:bg-stone-800/50">
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
<div class="flex flex-col flex-1">
<span class="text-base font-semibold text-slate-900 dark:text-slate-100">Saldo</span>
<span class="text-xs font-medium text-green-600 dark:text-green-400 mt-0.5">R$ 1.250,00 disponível</span>
</div>
<span class="material-symbols-outlined text-slate-400 text-sm">chevron_right</span>
</button>
</li>
<!-- Histórico -->
<li>
<button class="group flex w-full items-center gap-4 rounded-xl px-4 py-3 text-left transition-colors hover:bg-stone-100 dark:hover:bg-stone-800/50">
<span class="material-symbols-outlined text-primary">history</span>
<span class="flex-1 text-base font-semibold text-slate-900 dark:text-slate-100">Histórico de Viagens</span>
</button>
</li>
<!-- Veículos -->
<li>
<button class="group flex w-full items-center gap-4 rounded-xl px-4 py-3 text-left transition-colors hover:bg-stone-100 dark:hover:bg-stone-800/50">
<span class="material-symbols-outlined text-primary">local_shipping</span>
<span class="flex-1 text-base font-semibold text-slate-900 dark:text-slate-100">Meus Veículos</span>
</button>
</li>
<!-- Suporte -->
<li>
<button class="group flex w-full items-center gap-4 rounded-xl px-4 py-3 text-left transition-colors hover:bg-stone-100 dark:hover:bg-stone-800/50">
<span class="material-symbols-outlined text-primary">headset_mic</span>
<span class="flex-1 text-base font-semibold text-slate-900 dark:text-slate-100">Suporte</span>
</button>
</li>
</ul>
</div>
<!-- Footer / Logout -->
<div class="mt-auto px-4 pb-8">
<button class="group flex w-full items-center gap-4 rounded-xl px-4 py-3 text-left transition-colors hover:bg-red-50 dark:hover:bg-red-900/10">
<span class="material-symbols-outlined text-red-500 dark:text-red-400">logout</span>
<span class="text-base font-semibold text-red-600 dark:text-red-400">Sair</span>
</button>
<div class="mt-6 flex justify-center">
<p class="text-[10px] uppercase tracking-wider text-slate-400 dark:text-slate-600">Versão 2.4.0</p>
</div>
</div>
</div>
<!-- Main Content Placeholder (Blurred in background) -->
<div class="flex flex-1 flex-col overflow-y-auto opacity-30 pointer-events-none p-4">
<!-- Top Bar Placeholder -->
<div class="flex items-center justify-between mb-6">
<div class="h-10 w-10 rounded-full bg-slate-700/20"></div>
<div class="h-6 w-32 rounded bg-slate-700/20"></div>
<div class="h-10 w-10 rounded-full bg-slate-700/20"></div>
</div>
<!-- Map Placeholder -->
<div class="relative h-64 w-full overflow-hidden rounded-xl bg-slate-800/50 mb-4">
<div class="absolute inset-0 bg-gradient-to-br from-slate-700/20 to-slate-900/20"></div>
</div>
<!-- List Placeholder -->
<div class="space-y-4">
<div class="h-24 w-full rounded-xl bg-slate-800/30"></div>
<div class="h-24 w-full rounded-xl bg-slate-800/30"></div>
<div class="h-24 w-full rounded-xl bg-slate-800/30"></div>
</div>
</div>
</div>
</body></html>
